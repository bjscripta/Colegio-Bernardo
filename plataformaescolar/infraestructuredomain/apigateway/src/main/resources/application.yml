server:
  port: 8080
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
logging:
  level:
    org.springframework.gateway: DEBUG
    reactor.netty.http.client: DEBUG
spring:
  cloud:
    gateway:
      routes:
        - id: customer_service
          uri: lb://businessdomain-customer
          predicates:
            - Path=/**
          filters:
            - AuthenticationFilterinig
        