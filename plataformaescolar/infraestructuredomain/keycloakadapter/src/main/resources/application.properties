spring.application.name=keycloakadapter
server.port=8088

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

keycloak.base-uri=http://keycloak-server:8091/auth/realms/
keycloak.authorization-uri=http://keycloak-server:8091/realms/PaymentChain/protocol/openid-connect/auth
keycloak.user-info-uri=http://keycloak-server:8091/realms/PaymentChain/protocol/openid-connect/userinfo
keycloak.token-uri=http://keycloak-server:8091/realms/PaymentChain/protocol/openid-connect/token
keycloak.logout=http://keycloak-server:8091/realms/PaymentChain/protocol/openid-connect/logout
keycloak.jwk-set-uri=http://keycloak-server:8091/realms/PaymentChain/protocol/openid-connect/certs

keycloak.certs-id=r2RN6wtySEg9M_cnH4OoLFUWGn6oDOzxh9DAtJIwpmk
keycloak.client-id=front-client-app
keycloak.client-secret=qwerty
keycloak.scope=profile
keycloak.authorization-grant-type=password
keycloak.authorization-grant-type-refresh=refresh_token

logging.level.root=INFO